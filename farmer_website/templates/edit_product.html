{% extends "base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center">Edit Product: {{ product.name }}</h2>
        <div class="card p-4 shadow-sm">
            <form method="POST" enctype="multipart/form-data" action="{{ url_for('edit_product', product_id=product.id) }}">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" class="form-control" name="name" id="name" value="{{ product.name }}" required>
                </div>
                <div class="form-group">
                    <label for="image">Product Image</label>
                    <input type="file" class="form-control" name="image" id="image" accept="image/png, image/jpeg">
                    <small class="form-text text-muted">Leave blank if you do not want to change the image.</small>
                </div>
                <div class="form-group">
                    <label for="cost">Cost</label>
                    <input type="number" step="0.01" class="form-control" name="cost" id="cost" value="{{ product.cost }}" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" class="form-control" name="quantity" id="quantity" value="{{ product.quantity }}" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Update Product</button>
            </form>

            <form method="POST" action="{{ url_for('delete_product', product_id=product.id) }}" class="mt-3">
                <button type="submit" class="btn btn-danger btn-block" onclick="return confirm('Are you sure you want to delete this product?');">Delete Product</button>
            </form>

            <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-link mt-3">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
